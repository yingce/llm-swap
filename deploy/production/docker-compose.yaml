name: llmswap

services:
  gateway:
    image: ${LLMSWAP_GATEWAY_IMAGE:-llmswap-gateway:tailscale}
    container_name: llmswap-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      LLMSWAP_GATEWAY_CONFIG: /opt/llmswap/gateway.yaml
      LLMSWAP_ENABLE_TAILSCALE: ${LLMSWAP_GATEWAY_ENABLE_TAILSCALE:-0}
      LLMSWAP_TAILSCALE_AUTHKEY_FILE: ${LLMSWAP_GATEWAY_TAILSCALE_AUTHKEY_FILE:-}
      LLMSWAP_TAILSCALE_HOSTNAME: ${LLMSWAP_GATEWAY_TAILSCALE_HOSTNAME:-}
      LLMSWAP_TAILSCALE_TUN: ${LLMSWAP_GATEWAY_TAILSCALE_TUN:-tun}
      LLMSWAP_RECORDS_STORE_ENABLED: ${LLMSWAP_RECORDS_STORE_ENABLED:-1}
      LLMSWAP_RECORDS_STORE_TYPE: postgres
      PG_DSN: postgres://llmswap:llmswap@records-postgres:5432/llmswap?sslmode=disable
      LLMSWAP_RECORDS_STORE_AUTO_MIGRATE: ${LLMSWAP_RECORDS_STORE_AUTO_MIGRATE:-1}
      LLMSWAP_RECORDS_STORE_GATEWAY_ID: ${LLMSWAP_RECORDS_STORE_GATEWAY_ID:-production-gateway}
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - /opt/llmswap/gateway.yaml:/opt/llmswap/gateway.yaml
      - /opt/llmswap/logs:/opt/llmswap/logs
      - /opt/llmswap/tailscale:/opt/llmswap/tailscale
    depends_on:
      records-postgres:
        condition: service_healthy
      victoriametrics:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  victoriametrics:
    image: victoriametrics/victoria-metrics:latest
    container_name: llmswap-victoriametrics
    command:
      - -storageDataPath=/victoria-metrics-data
      - -retentionPeriod=30d
    restart: unless-stopped
    ports:
      - "127.0.0.1:8428:8428"
    volumes:
      - /opt/llmswap/data/victoriametrics:/victoria-metrics-data

  records-postgres:
    image: postgres:16-alpine
    container_name: llmswap-records-postgres
    environment:
      POSTGRES_DB: llmswap
      POSTGRES_USER: llmswap
      POSTGRES_PASSWORD: llmswap
    restart: unless-stopped
    volumes:
      - /opt/llmswap/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llmswap -d llmswap"]
      interval: 10s
      timeout: 5s
      retries: 5

  vmagent:
    image: victoriametrics/vmagent:latest
    container_name: llmswap-vmagent
    depends_on:
      - gateway
      - victoriametrics
    command:
      - -promscrape.config=/etc/vmagent/promscrape.yml
      - -remoteWrite.url=http://victoriametrics:8428/api/v1/write
    restart: unless-stopped
    volumes:
      - ./vmagent/promscrape.yml:/etc/vmagent/promscrape.yml:ro
