services:
  gateway:
    image: ${LLMSWAP_GATEWAY_IMAGE:-llmswap-gateway:tailscale}
    container_name: llmswap-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      LLMSWAP_GATEWAY_CONFIG: /opt/llmswap/gateway.yaml
      LLMSWAP_ENABLE_TAILSCALE: ${LLMSWAP_GATEWAY_ENABLE_TAILSCALE:-1}
      LLMSWAP_TAILSCALE_AUTHKEY_FILE: ${LLMSWAP_GATEWAY_TAILSCALE_AUTHKEY_FILE:-/opt/llmswap/tailscale/authkey}
      LLMSWAP_TAILSCALE_HOSTNAME: ${LLMSWAP_GATEWAY_TAILSCALE_HOSTNAME:-llmswap-gateway-8-141-111-101}
      LLMSWAP_TAILSCALE_TUN: ${LLMSWAP_GATEWAY_TAILSCALE_TUN:-tun}
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - /opt/llmswap/gateway.yaml:/opt/llmswap/gateway.yaml
      - /opt/llmswap/logs:/opt/llmswap/logs
      - /opt/llmswap/tailscale:/opt/llmswap/tailscale
    depends_on:
      - victoriametrics
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  victoriametrics:
    image: victoriametrics/victoria-metrics:latest
    container_name: llmswap-victoriametrics
    command:
      - -storageDataPath=/victoria-metrics-data
      - -retentionPeriod=30d
    restart: unless-stopped
    ports:
      - "127.0.0.1:8428:8428"
    volumes:
      - /opt/llmswap/data/victoriametrics:/victoria-metrics-data

  vmagent:
    image: victoriametrics/vmagent:latest
    container_name: llmswap-vmagent
    depends_on:
      - gateway
      - victoriametrics
    command:
      - -promscrape.config=/etc/vmagent/promscrape.yml
      - -remoteWrite.url=http://victoriametrics:8428/api/v1/write
    restart: unless-stopped
    volumes:
      - ./vmagent/promscrape.yml:/etc/vmagent/promscrape.yml:ro
