gateway:
  listen_addr: :8080
  proxy_attempts: 3

oss:
  base_url: https://oss.example.com/llm-swap

tokens:
  client: client-token
  agent: agent-token
  # Optional. Defaults to tokens.agent when omitted.
  # llama_swap: agent-token

# Optional historical metrics query store. Gateway still exposes /metrics;
# vmagent should scrape it and remote_write to VictoriaMetrics.
metrics_store:
  enabled: false
  type: victoriametrics
  query_url: http://victoriametrics:8428
  default_range: 1h
  max_range: 7d
  timeout_ms: 3000

models:
  qwen3-32b-awq:
    priority: 10
    min_loaded: 0
    # Optional hard ceiling. When omitted, gateway uses automatic expansion
    # bounded by eligible workers and protected model floors.
    max_loaded: 1
    max_concurrency: 2
    max_queue: 8
    queue_timeout_ms: 30000
    ttl: 600
    artifact:
      object: models/qwen3-32b-awq.tar.gz
      kind: tar_gz
      crc64ecma: sample-crc64ecma
    runtime: sglang
    runtime_args:
      - --trust-remote-code
      - --tp-size 1
      - --dtype bfloat16
      - --max-total-tokens 2048
      - --disable-cuda-graph
      - --attention-backend triton
      - --sampling-backend pytorch
      - --sampling-defaults openai
      - --max-running-requests 1
      - --max-queued-requests 8

tag_policies:
  gpu-sample:
    max_concurrency: 2
    max_queue: 8
    worker_defaults:
      max_concurrency: 2
      max_queue: 8
    allowed_models:
      - qwen3-32b-awq
    warm_when_idle: qwen3-32b-awq
